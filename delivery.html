<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Verify - Fresy</title>
<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #27ae60;
  border-radius:6px;
}

button{
  padding:10px 20px;
  background:#27ae60;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#result{
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
  <h2>🚚 Delivery Verification</h2>

  <input type="text" id="orderId" placeholder="Enter Order ID">
  <input type="text" id="deliveryCode" placeholder="Enter Delivery Code">

  <button onclick="verifyDelivery()">Verify</button>

  <div id="result"></div>
</div>

<script>
  function verifyDelivery(){

  let orderId = document.getElementById("orderId").value.trim();
  let deliveryCode = document.getElementById("deliveryCode").value.trim();
  let result = document.getElementById("result");

  if(!orderId || !deliveryCode){
    result.innerText = "Please enter Order ID & Delivery Code";
    result.style.color = "red";
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyKYCR6XvsXGRgvGPcNcBKkUEIsCAIATEFxg33Ey8vmmIe0EUWtBycG5jczmZsSbWQ1/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "VERIFY",
      orderId: orderId,
      deliveryCode: deliveryCode
    })
  })
  .then(res => res.text())
  .then(response => {

      console.log("Server Response:", response);

      if(response === "DELIVERY_SUCCESS"){
        result.innerText = "✅ Delivery Completed Successfully!";
        result.style.color = "green";

      } else if(response === "WRONG_CODE"){
        result.innerText = "❌ Wrong Delivery Code!";
        result.style.color = "red";

      } else if(response === "ORDER_NOT_FOUND"){
        result.innerText = "❌ Order Not Found!";
        result.style.color = "red";

      } else {
        result.innerText = response;
        result.style.color = "red";
      }

  })
  .catch(err => {
      console.error("Fetch Error:", err);
      result.innerText = "Server Error!";
      result.style.color = "red";
  });

  }

  
</script>

</body>
</html>
