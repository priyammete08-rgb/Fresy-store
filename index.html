<script>
const menuToggle = document.getElementById("menu-toggle");
const navbar = document.getElementById("navbar");

menuToggle.addEventListener("click", () => {
    navbar.classList.toggle("active");
});


// Load cart from localStorage
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ADD TO CART */
function addToCart(name, price) {

    let existing = cart.find(item => item.name === name);

    if (existing) {
        existing.qty += 1;
    } else {
        cart.push({
            name: name,
            price: price,
            qty: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Product Added to Cart ✅");
}

/* LOAD CART PAGE */
function loadCart() {

    const container = document.getElementById("cart-items");
    if (!container) return;

    container.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {

        total += item.price * item.qty;

        container.innerHTML += `
            <div>
                <h3>${item.name}</h3>
                <p>₹${item.price} × ${item.qty}</p>
                <button onclick="removeItem(${index})">Remove</button>
                <hr>
            </div>
        `;
    });

    document.getElementById("total").innerText = total;
}

/* REMOVE ITEM */
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

/* Auto run when cart page loads */
loadCart();
</script>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const areaSelect = document.getElementById("areaSelect");

    const params = new URLSearchParams(window.location.search);
    const area = params.get("area");

    // 🔹 If URL has area → set selected option
    if(area && areaSelect){
        areaSelect.value = area;
    }

    // 🔹 Auto redirect when change
    if(areaSelect){
        areaSelect.addEventListener("change", function(){
            let selectedArea = this.value;
            if(selectedArea){
                window.location.href = "index.html?area=" + selectedArea;
            }
        });
    }

    // 🔹 Hide vegetable for Jhilu
    const vegCircle = document.getElementById("vegCircle");
  const fruitCircle = document.getElementById("fruitCircle");
    if(area === "jhilu"){
     if(vegCircle)vegCircle.style.display = "none";
      if(fruitCircle) fruitCircle.style.display = "none";
    }

});

</script>
